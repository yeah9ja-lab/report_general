system:
  # 注意：loop_interval_minutes 已废弃，由 Cloud Scheduler 控制
  termination_hour: 23
  timezone_offset: 5.5
  history_file: "history.json"
  history_bucket: "report_general" # 存储桶名称，用来存放 trend 对比信息
