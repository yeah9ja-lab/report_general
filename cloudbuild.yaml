steps:
  # 1. 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auto-report-service:$SHORT_SHA', '.']

  # 2. 推送镜像到 Google Container Registry (现在使用 Artifact Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auto-report-service:$SHORT_SHA']

  # 3. 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'reportgeneral'  # 服务名称 (对齐控制台显示的名称)
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auto-report-service:$SHORT_SHA'
      - '--region'
      - 'asia-south1'          # 你的区域
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated' # 允许公开访问(由Scheduler触发)
      - '--memory'
      - '2Gi'                  # 设置内存，Playwright跑浏览器比较吃内存，建议 1G 或 2G

options:
  logging: CLOUD_LOGGING_ONLY
